<svg xmlns="http://www.w3.org/2000/svg" width="560" height="140" viewBox="0 0 560 140" role="img" aria-label="whatfirst small">
  <title>whatfirst · small</title>
  <defs>
    <linearGradient id="wf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Icon: a stack of task cards with the top one picked as "do this first" -->
  <g transform="translate(20 22)">
    <!-- lower cards (the rest of the brain-dump) -->
    <rect x="14" y="66" width="78" height="16" rx="5" fill="#c7d2fe"/>
    <rect x="9"  y="44" width="84" height="16" rx="5" fill="#a5b4fc"/>
    <!-- the chosen first task, lifted and highlighted -->
    <rect x="2"  y="12" width="94" height="26" rx="7" fill="url(#wf-grad)"/>
    <!-- check mark on the chosen task -->
    <path d="M16 25 l7 7 l14 -16" fill="none" stroke="#ffffff" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- "first" rank pip -->
    <circle cx="84" cy="25" r="6" fill="#ffffff" opacity="0.9"/>
    <text x="84" y="29" font-family="Verdana, Geneva, sans-serif" font-size="9"
          font-weight="700" fill="#2563eb" text-anchor="middle">1</text>
  </g>

  <!-- Wordmark -->
  <g font-family="Verdana, Geneva, sans-serif">
    <text x="138" y="78" font-size="46" font-weight="700" fill="#1e293b">what<tspan fill="url(#wf-grad)">first</tspan></text>
    <text x="142" y="104" font-size="17" font-weight="600" letter-spacing="1.5" fill="#64748b">· small</text>
  </g>

  <!-- tagline -->
  <text x="138" y="128" font-family="Verdana, Geneva, sans-serif" font-size="12"
        fill="#94a3b8">what to do first — with the math shown</text>
</svg>
